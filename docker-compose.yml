services:
  cdn:
    image: ghcr.io/zxcloli666/secureserve-cdn:latest
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - STORAGE_PATH=/storage
      - DATABASE_PATH=/data/cdn.db
    volumes:
      - ./storage:/storage
      - ./data:/data
